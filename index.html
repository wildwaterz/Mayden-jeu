<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mayden-jeu — A Pokopia-inspired terraforming game</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1b2230;
        color: #e8eef5;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 16px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      p.hint {
        margin: 0;
        font-size: 13px;
        opacity: 0.8;
        text-align: center;
        max-width: 720px;
      }
      #game {
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Mayden-jeu</h1>
      <p class="hint">
        Play as a shapeshifter. Use moves to terraform the withered land,
        build a habitat, and attract a wild creature.
      </p>
      <div id="game"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
